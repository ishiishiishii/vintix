# Bootstrap AD datasets produced by:
#   scripts/collect_ad_data_parallel.py --run_all_cross --auto_output_dir ...
#
# NOTE:
# - Keys should match each dataset's metadata "task_name".
# - For these bootstrap directories, we generate <dirname>.json with task_name=<dirname>,
#   so keys below match directory names (ft_*).
#
# Used by:
#   configs/train_bootstrap_ad_run_all_cross_e2.yaml

ft_go1_to_go2:
  type: "default"
  path: "go2_trajectories/go2_ad_parallel_bootstrap/ft_go1_to_go2"
  group: "quadruped_locomotion"
  reward_scale: 1.0
  episode_sparsity: 1

